name: Deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 22 * * *'   # UTC 22:00 = 北京时间 06:00
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm install cheerio
          npm install ali-oss

      - name: Scrape & merge deals (daily)
        if: github.event_name != 'push'
        run: |
          node scraper.js
          node daily-update.js

      - name: Upload all files to OSS
        env:
          ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          node deploy-oss.js
